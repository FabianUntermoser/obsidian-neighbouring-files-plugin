name: Release Obsidian plugin

on:
    push:
        tags:
            - "*"

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write

        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                persist-credentials: false

            - name: Use Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: "22.x"
                  package-manager-cache: false

            - name: Build plugin
              run: |
                  npm install
                  npm run build
                  npm run test

            - name: Attest build artifacts
              uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v4.1.1
              with:
                  subject-path: "main.js,manifest.json"

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"

                  gh release create "$tag" --title "$tag" --generate-notes --draft main.js manifest.json
